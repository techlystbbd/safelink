<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <style>
    body {
      text-align: center;
      background: #000;
      color: #fff;
      font-family: Arial;
    }
    button {
      padding: 10px 20px;
      display: none;
    }
  </style>
</head>
<body>

<h2>Please wait...</h2>
<p id="timer">5</p>
<button id="go">Continue</button>

<script>
let id = location.hash.substring(1);

fetch("../data.json")
.then(res => res.json())
.then(data => {

  let url = data[id];

  if (!url) {
    document.body.innerHTML = "Invalid Link";
    return;
  }

  let t = 5;
  let timer = setInterval(() => {
    t--;
    document.getElementById("timer").innerText = t;

    if (t <= 0) {
      clearInterval(timer);
      document.getElementById("go").style.display = "block";

      document.getElementById("go").onclick = () => {
        window.location.href = url;
      };
    }
  }, 1000);
});
</script>

</body>
</html>
